<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vote Action</title>
</head>
<body>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// 🔹 Mets ici ta config Firebase identique à overlay.html
const firebaseConfig = {
  apiKey: "AIzaSyBdb_c323T5-Bv30WR2C11trPlHCN28XEM",
  authDomain: "djedrums-4e59f.firebaseapp.com",
  databaseURL: "https://djedrums-4e59f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "djedrums-4e59f",
  storageBucket: "djedrums-4e59f.firebasestorage.app",
  messagingSenderId: "377726412793",
  appId: "1:377726412793:web:0cd2c84d13aad404697f28",
  measurementId: "G-W3ZYHYHEXE"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const action = params.get("action");

let updateData = {};

if(action === "oui_plus") updateData["votes/oui"] = increment(1);
if(action === "oui_moins") updateData["votes/oui"] = increment(-1);
if(action === "non_plus") updateData["votes/non"] = increment(1);
if(action === "non_moins") updateData["votes/non"] = increment(-1);
if(action === "reset"){
  updateData["votes/oui"] = 0;
  updateData["votes/non"] = 0;
}

update(ref(db), updateData).then(()=>{
  console.log("Firebase mis à jour :", updateData);
});
</script>
</body>
</html>
