<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vote Action</title>
</head>
<body>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// 🔹 Mets ici ta config Firebase identique à overlay.html
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJECT.firebaseapp.com",
  databaseURL: "https://TON_PROJECT.firebaseio.com",
  projectId: "TON_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const action = params.get("action");

let updateData = {};

if(action === "oui_plus") updateData["votes/oui"] = increment(1);
if(action === "oui_moins") updateData["votes/oui"] = increment(-1);
if(action === "non_plus") updateData["votes/non"] = increment(1);
if(action === "non_moins") updateData["votes/non"] = increment(-1);
if(action === "reset"){
  updateData["votes/oui"] = 0;
  updateData["votes/non"] = 0;
}

update(ref(db), updateData).then(()=>{
  console.log("Firebase mis à jour :", updateData);
});
</script>
</body>
</html>
