<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vote Overlay</title>
<style>
/* Import de la police She Smile depuis le fichier local */
@font-face {
  font-family: "She Smile";
  src: url("She Smiles.otf") format("opentype");
  font-weight: normal;
  font-style: normal;
}

body {
  margin:0;
  background:transparent;
  font-family:"She Smile", Arial, sans-serif;
}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:120px;
  height:100vh;
}

.vote{
  text-align:center;
  display:flex;
  align-items: center;
  gap:25px;
}
.vote img{
  width:120px;
  height:120px;
  object-fit:contain;
}
.label{
  font-size:40px;
  font-weight:bold;
}

.count{
  font-size:140px;
  font-weight:bold;
  /* Contour autour du texte */
  -webkit-text-stroke: 0.1px rgb(255, 255, 255); /* Chrome, Edge, Safari */
  text-stroke: 0.1px rgb(255, 255, 255); /* pas encore standard partout */


}

.oui{ 
    color:#3FBA4C;
    width: 90px;
    text-align: center;
    display: flex;
    align-content: center;
    justify-content: center;
    align-items: center;
}
.non{ 
    color:#F41D25;
    width: 90px;
    text-align: center;
    display: flex;
    align-content: center;
    justify-content: center;
    align-items: center;
}
</style>
</head>
<body>

<div class="container">
  <div class="vote">
    <img src="oui.png" alt="Oui" />
    <div id="oui" class="count oui">0</div>
  </div>
  <div class="vote">
    <img src="non.png" alt="Non" />     
    <div id="non" class="count non">0</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// 🔹 Mets ici la même config que action.html
const firebaseConfig = {
  apiKey: "AIzaSyBdb_c323T5-Bv30WR2C11trPlHCN28XEM",
  authDomain: "djedrums-4e59f.firebaseapp.com",
  databaseURL: "https://djedrums-4e59f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "djedrums-4e59f",
  storageBucket: "djedrums-4e59f.firebasestorage.app",
  messagingSenderId: "377726412793",
  appId: "1:377726412793:web:0cd2c84d13aad404697f28",
  measurementId: "G-W3ZYHYHEXE"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const votesRef = ref(db,"votes");

onValue(votesRef, (snapshot) => {
  const data = snapshot.val();
  document.getElementById("oui").textContent = data.oui;
  document.getElementById("non").textContent = data.non;
});
</script>

</body>
</html>
