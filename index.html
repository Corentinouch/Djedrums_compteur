<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vote Overlay</title>
<style>
body {
  margin:0;
  background:transparent;
  font-family:Arial,sans-serif;
}
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:120px;
  height:100vh;
}
.vote{
  text-align:center;
}
.label{
  font-size:40px;
  font-weight:bold;
}
.count{
  font-size:140px;
  font-weight:bold;
}
.oui{ color:#00ff99; }
.non{ color:#ff3366; }
</style>
</head>
<body>

<div class="container">
  <div class="vote">
    <div class="label oui">OUI</div>
    <div id="oui" class="count">0</div>
  </div>
  <div class="vote">
    <div class="label non">NON</div>
    <div id="non" class="count">0</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// 🔹 Mets ici la même config que action.html
const firebaseConfig = {
  apiKey: "AIzaSyBdb_c323T5-Bv30WR2C11trPlHCN28XEM",
  authDomain: "djedrums-4e59f.firebaseapp.com",
  databaseURL: "https://djedrums-4e59f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "djedrums-4e59f",
  storageBucket: "djedrums-4e59f.firebasestorage.app",
  messagingSenderId: "377726412793",
  appId: "1:377726412793:web:0cd2c84d13aad404697f28",
  measurementId: "G-W3ZYHYHEXE"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const votesRef = ref(db,"votes");

onValue(votesRef, (snapshot) => {
  const data = snapshot.val();
  document.getElementById("oui").textContent = data.oui;
  document.getElementById("non").textContent = data.non;
});
</script>

</body>
</html>
